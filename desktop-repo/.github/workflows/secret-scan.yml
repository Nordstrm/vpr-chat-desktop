name: Secret Scan

# Blockerar commits/PRs om API-nycklar, tokens eller andra hemligheter
# råkar checkas in. Körs på alla pushar och pull requests.
on:
  push:
    branches: ['**']
    tags: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Hela historiken behövs så Gitleaks kan skanna alla commits,
          # inte bara den senaste.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Misslyckas (exit 1) om någon hemlighet hittas → blockerar merge.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
